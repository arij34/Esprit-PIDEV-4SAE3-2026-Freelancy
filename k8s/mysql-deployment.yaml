apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-matching
  namespace: freelancy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-matching
  template:
    metadata:
      labels:
        app: mysql-matching
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root"
            - name: MYSQL_DATABASE
              value: matching_db
            - name: MYSQL_USER
              value: matching_user
            - name: MYSQL_PASSWORD
              value: matching_pass
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-matching
  namespace: freelancy
spec:
  selector:
    app: mysql-matching
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP