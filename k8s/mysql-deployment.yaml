apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-skill
  namespace: freelancy          # ✅ Corrigé: skill → freelancy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-skill
  template:
    metadata:
      labels:
        app: mysql-skill
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root"
            - name: MYSQL_DATABASE
              value: skill_db
            - name: MYSQL_USER
              value: skill_user
            - name: MYSQL_PASSWORD
              value: skill_pass
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: freelancy          # ✅ Corrigé: skill → freelancy
spec:
  selector:
    app: mysql-skill
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
