apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-challenge
  namespace: freelancy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-challenge
  template:
    metadata:
      labels:
        app: mysql-challenge
    spec:
      containers:
        - name: mysql
          image: mysql:8
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: challenge_db
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: freelancy
spec:
  selector:
    app: mysql-challenge
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
  type: ClusterIP