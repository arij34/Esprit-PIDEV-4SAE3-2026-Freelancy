apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-contrat-pvc          # ✅ Corrigé: mysql-skill-pvc → mysql-contrat-pvc
  namespace: freelancy
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-contrat              # ✅ Corrigé: mysql-skill → mysql-contrat
  namespace: freelancy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-contrat
  template:
    metadata:
      labels:
        app: mysql-contrat
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root"
            - name: MYSQL_DATABASE
              value: contrat_dbdb   # ✅ Correct
            - name: MYSQL_USER
              value: root
            - name: MYSQL_PASSWORD
              value: ""
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-contrat-pvc   # ✅ Corrigé
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-contrat-service      # ✅ Corrigé: mysql-service → mysql-contrat-service
  namespace: freelancy
spec:
  selector:
    app: mysql-contrat
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP