apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-deployment
  namespace: freelancy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matching-module
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: matching-module
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8087"
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox
          command: ['sh', '-c', 'until nc -z mysql-matching 3306; do echo waiting for mysql; sleep 5; done']
      containers:
        - name: matching-module
          image: arijachach/matching-module:latest
          ports:
            - containerPort: 8087
          envFrom:
            - configMapRef:
                name: matching-config
            - secretRef:
                name: matching-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 10