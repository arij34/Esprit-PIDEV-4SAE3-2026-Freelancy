apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-analysis-deployment
  namespace: freelancy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-analysis
  template:
    metadata:
      labels:
        app: smart-analysis
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: smart-analysis
          image: syrinebouden/smart-analysis:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: smart-analysis-config
            - secretRef:
                name: smart-analysis-secret
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 5
