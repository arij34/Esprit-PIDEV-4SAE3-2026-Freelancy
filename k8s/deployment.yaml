apiVersion: apps/v1
kind: Deployment
metadata:
  name: skill-deployment
  namespace: freelancy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skill-management
  template:
    metadata:
      labels:
        app: skill-management
      # ✅ Annotations pour que Prometheus auto-découvre ce pod
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8086"
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox
          command: ['sh', '-c', 'until nc -z mysql-service 3306; do echo waiting for mysql; sleep 5; done']
      containers:
        - name: skill-management
          image: arijachach/skill-management:latest
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: skill-config
            - secretRef:
                name: skill-secret
          # ✅ ReadinessProbe — K8s attend que le service soit prêt avant d'envoyer du trafic
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 180
            periodSeconds: 15
            failureThreshold: 10
          # ✅ LivenessProbe — K8s redémarre le pod s'il est bloqué
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 210
            periodSeconds: 20
            failureThreshold: 5