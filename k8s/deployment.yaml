apiVersion: apps/v1
kind: Deployment
metadata:
  name: skill-deployment
  namespace: freelancy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skill-management
  template:
    metadata:
      labels:
        app: skill-management
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox
          command: ['sh', '-c', 'until nc -z mysql-service 3306; do echo waiting for mysql; sleep 5; done']
      containers:
        - name: skill-management
          image: arijachach/skill-management:latest
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: skill-config
            - secretRef:
                name: skill-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 180
            periodSeconds: 15
            failureThreshold: 10