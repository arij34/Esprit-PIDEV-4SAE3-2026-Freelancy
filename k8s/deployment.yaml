apiVersion: apps/v1
kind: Deployment
metadata:
  name: projet-deployment
  namespace: freelancy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: projet
  template:
    metadata:
      labels:
        app: projet
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8085"
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox
          command: ['sh', '-c', 'until nc -z mysql-projet-service 3306; do echo waiting for mysql; sleep 5; done']
          # ✅ Corrigé: mysql-service → mysql-projet-service
      containers:
        - name: projet
          image: pidevfreelancy/project-management:latest   # ✅ Corrigé
          ports:
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: projet-config
            - secretRef:
                name: projet-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 180
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 210
            periodSeconds: 20
            failureThreshold: 5