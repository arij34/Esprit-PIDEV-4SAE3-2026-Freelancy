apiVersion: v1
kind: ConfigMap
metadata:
  name: blog-service-config
  namespace: freelancy
data:
  SPRING_APPLICATION_NAME: "BLOG-SERVICE"
  SERVER_PORT: "8050"
  SPRING_DATASOURCE_URL: "jdbc:mysql://CHANGE_ME_HOST:3306/microservices_db?createDatabaseIfNotExist=true"
  SPRING_DATASOURCE_USERNAME: "CHANGE_ME"
  SPRING_DATASOURCE_PASSWORD: "CHANGE_ME"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SPRING_JPA_SHOW_SQL: "true"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.MySQLDialect"
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://CHANGE_ME_EUREKA:8761/eureka/"
  EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
  EUREKA_CLIENT_FETCH_REGISTRY: "false"
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
  EUREKA_INSTANCE_HOSTNAME: "blog-service"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
