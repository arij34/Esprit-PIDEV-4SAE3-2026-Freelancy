apiVersion: v1
kind: ConfigMap
metadata:
  name: matching-config
  namespace: matching
data:
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql-service:3306/matching_db?createDatabaseIfNotExist=true
  SPRING_DATASOURCE_USERNAME: matching_user
  SPRING_DATASOURCE_PASSWORD: matching_pass
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-service:8761/eureka