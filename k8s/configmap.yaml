apiVersion: v1
kind: ConfigMap
metadata:
  name: skill-config
  namespace: freelancy
data:
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql-service:3306/skill_db?createDatabaseIfNotExist=true
  SPRING_DATASOURCE_USERNAME: skill_user
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-service:8761/eureka
  EUREKA_CLIENT_ENABLED: "false"
  EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
  EUREKA_CLIENT_FETCH_REGISTRY: "false"