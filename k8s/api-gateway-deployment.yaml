apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-deployment
  namespace: freelancy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ameni221/api-gateway:latest
          ports:
            - containerPort: 8091
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-service:8761/eureka
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_ID
              value: challenge-service
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_URI
              value: http://challenge-service:8077
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_ID
              value: examquiz-service
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_URI
              value: http://examquiz-service:8150
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8091
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: freelancy
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8091
      targetPort: 8091
      nodePort: 30091
  type: NodePort