apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-event
  namespace: freelancy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-event
  template:
    metadata:
      labels:
        app: mysql-event
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: event-secret
              key: mysql-root-password
        - name: MYSQL_DATABASE
          value: eventdb
        ports:
        - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-event
  namespace: freelancy
spec:
  selector:
    app: mysql-event
  ports:
  - port: 3306
    targetPort: 3306
  type: ClusterIP
