apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-deployment
  namespace: freelancy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event
  template:
    metadata:
      labels:
        app: event
    spec:
      containers:
      - name: event
        image: jaff2003/event:latest
        ports:
        - containerPort: 8084
        envFrom:
        - configMapRef:
            name: event-config
        env:
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: event-secret
              key: mysql-password
