spring.application.name=evenmentt
spring.datasource.url=jdbc:mysql://localhost:3306/Evenment?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
server.port=8084
server.servlet.context-path=/evenment

springdoc.swagger-ui.path=/swagger-ui


spring.web.cors.allow-credentials=true
spring.web.cors.allowed-origins=http://localhost:4200,http://localhost:8091
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.fetchRegistry=true
eureka.client.registerWithEureka=true
eureka.instance.prefer-ip-address=true
