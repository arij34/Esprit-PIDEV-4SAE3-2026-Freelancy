# ===============================
# SERVER CONFIG
# ===============================
server.port=8085

# ===============================
# SPRING APPLICATION
# ===============================
spring.application.name=project-service
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=false

# ===============================
# SECURITY (JWT)
# ===============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/smart-platform}

# ===============================
# DATABASE
# ===============================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/projet_Module?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ===============================
# RABBITMQ (ASYNC)
# ===============================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ===============================
# MAIL CONFIG
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sirinebouden20@gmail.com
spring.mail.password=${GMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# JACKSON (DATE FORMAT)
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# ===============================
# KEYCLOAK ADMIN
# ===============================
keycloak.admin.url=http://localhost:8081
keycloak.admin.realm=smart-platform
keycloak.admin.username=admin
keycloak.admin.password=admin