server.port=8050
spring.application.name=BLOG-SERVICE

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/microservices_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka
# Eureka (disabled for local dev to avoid startup dependency on Eureka server)
# If you want to enable Eureka, set these back to true and configure your Eureka server URL.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=false
# Do not fetch registry during local development
eureka.client.fetch-registry=false
# Preserve instance settings if you enable Eureka later
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}