spring.application.name=contrat
spring.datasource.url=jdbc:mysql://localhost:3306/contrat_dbdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
server.port=8097
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss


keycloak.admin.url=http://localhost:8081
keycloak.admin.realm=smart-platform
keycloak.admin.username=admin
keycloak.admin.password=admin

anthropic.api.key=
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.api.model=
spring.jackson.serialization.fail-on-empty-beans=false
user-service.url=http://localhost:8090



spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
app.mail.from=Freelancy Platform <noreply@freelancy.tn>
app.frontend.url=http://localhost:4200

docusign.base-path=https://demo.docusign.net/restapi

## DocuSign Account ID (obtained from DocuSign dashboard)
docusign.account-id=YOUR_ACCOUNT_ID

## OAuth2 Credentials (obtained from DocuSign developer console)
docusign.client-id=YOUR_CLIENT_ID
docusign.client-secret=YOUR_CLIENT_SECRET

## User ID for impersonation (Service Account User ID)
docusign.impersonated-user-id=YOUR_IMPERSONATED_USER_ID

## Callback URL (where user returns after signing)
docusign.return-url=http://localhost:4200/contracts

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true


