spring.application.name=payment-service
server.port=8092

# OAuth2 Resource Server (Keycloak)
app.keycloak.issuer=https://localhost:8443/realms/smart-platform
app.keycloak.jwk-set-uri=http://localhost:8081/realms/smart-platform/protocol/openid-connect/certs

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/smart_freelance_payment?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Downstream services
app.services.subscription.base-url=http://localhost:8091

# Mail (dev default: MailHog)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Email defaults
app.mail.from=no-reply@smartfreelance.local
