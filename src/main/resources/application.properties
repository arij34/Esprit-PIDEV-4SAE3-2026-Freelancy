spring.application.name=api-gateway
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=false
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/smart-platform}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/smart-platform/protocol/openid-connect/certs}