spring.application.name=contrat-test

# Required for Feign client placeholder resolution in tests
user-service.url=http://localhost:8090

# Required placeholders for beans that use @Value without defaults
# Keep them as "YOUR_*" / empty so the app stays in demo/fallback mode during tests.
docusign.account-id=YOUR_ACCOUNT_ID
docusign.client-id=YOUR_CLIENT_ID
docusign.client-secret=YOUR_CLIENT_SECRET
docusign.impersonated-user-id=YOUR_IMPERSONATED_USER_ID

anthropic.api.key=
anthropic.api.url=
anthropic.api.model=

spring.mail.username=

# Use in-memory H2 for tests (no external MySQL needed)
spring.datasource.url=jdbc:h2:mem:contrat_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable service discovery in tests
spring.cloud.discovery.enabled=false
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

