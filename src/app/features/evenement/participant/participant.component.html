<div class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-purple-50 flex">

  <!-- Sidebar (recherche + filtres) -->
  <aside class="w-80 bg-transparent flex-shrink-0 hidden lg:block px-6 py-8">
    <div class="bg-white rounded-3xl shadow-xl p-6 border border-slate-200">
      <!-- Search -->
      <div class="mb-6">
        <label class="block">
          <span class="text-sm font-semibold text-slate-700 mb-2 block">Search Participants</span>
          <div class="relative">
            <input [(ngModel)]="searchQuery"
                   (ngModelChange)="onSearchChange()"
                   type="text"
                   placeholder="Search participants..."
                   class="w-full pl-10 pr-4 py-3 rounded-2xl bg-slate-100 border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-400 transition"/>
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"
                 fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </div>
        </label>
      </div>

      <!-- Status Filter -->
      <h3 class="text-slate-700 font-semibold mb-4">Status</h3>
      <div class="space-y-3">
        <button *ngFor="let status of statuses"
                (click)="selectedStatus = status; onStatusChange()"
                class="w-full px-5 py-3 rounded-xl font-semibold transition"
                [ngClass]="selectedStatus === status
                  ? 'bg-gradient-to-r from-blue-600 to-purple-600 text-white shadow-lg'
                  : 'bg-slate-100 text-slate-600 hover:bg-slate-200'">
          {{ status }}
        </button>
      </div>

      <!-- Clear Filters -->
      <div class="mt-8">
        <button (click)="clearFilters()"
                class="w-full px-4 py-3 rounded-xl bg-slate-900 text-white font-semibold hover:bg-slate-800 transition">
          Clear All Filters
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Header -->
    <div class="bg-white border-b border-slate-200 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 lg:py-8 flex justify-between items-center">
        <h1 class="text-2xl lg:text-3xl font-bold text-slate-900">Liste des participants</h1>

        <div class="flex items-center gap-3">
          <button (click)="cancel()"
                  class="bg-slate-200 text-slate-800 px-5 py-2 rounded-lg shadow hover:bg-slate-300 transition">
            Cancel
          </button>

          <!-- Bouton notification -->
          <button (click)="checkClosedParticipants()"
                  class="bg-yellow-500 text-white px-5 py-2 rounded-lg shadow hover:bg-yellow-600 transition flex items-center gap-2">
            <span>🔔</span> Notifications
          </button>

          <button (click)="showAddModal = true"
                  class="bg-blue-500 text-white px-5 py-2 rounded-lg shadow hover:bg-blue-600 transition">
            Ajouter un participant
          </button>
        </div>
      </div>
    </div>

    <!-- Participant Cards -->

<!-- Zone affichage notifications -->
<div *ngIf="closedEvents.length > 0" 
     class="mt-4 bg-white border border-gray-200 text-gray-800 rounded-lg shadow-md">

  <!-- Header notification -->
  <div class="flex justify-between items-center px-4 py-3 border-b border-gray-200">
    <div class="flex items-center gap-2">
      <span class="text-lg text-yellow-600">🔔</span>
      <h3 class="text-sm font-semibold">Événements fermés</h3>
    </div>
    <!-- Bouton fermer (icône ✖) -->
    <button (click)="closedEvents = []"
            class="text-gray-500 hover:text-red-600 transition">
      ✖
    </button>
  </div>

  <!-- Liste des événements fermés -->
  <ul class="px-4 py-3 space-y-2">
    <li *ngFor="let e of closedEvents" 
        class="text-sm text-gray-700 bg-gray-50 px-3 py-2 rounded hover:bg-gray-100 transition">
      {{ e }}
    </li>
  </ul>
</div>
   <!-- Zone affichage notifications -->
  

    <div class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let p of filteredParticipants"
           class="bg-white rounded-2xl shadow-md p-6 border border-slate-200 flex flex-col gap-3 hover:shadow-lg transition">
        <h2 class="text-lg font-bold text-slate-800">Participant #{{ p.id }}</h2>
        <p class="text-slate-600">
          Événement : {{ p.event?.titre }} ({{ p.event?.dateDebut | date:'short' }})
        </p>
        <p class="text-sm font-semibold"
           [ngClass]="p.status === 'ACCEPTED' ? 'text-green-600' : p.status === 'REJECTED' ? 'text-red-600' : 'text-yellow-600'">
          {{ p.status }}
        </p>
        <div class="flex gap-2 mt-3">
          <button (click)="deleteParticipant(p.id!)"
                  class="flex-1 px-4 py-2 rounded-lg bg-red-500 text-white hover:bg-red-600 transition">
            Supprimer
          </button>
          <button (click)="startEdit(p)"
                  class="flex-1 px-4 py-2 rounded-lg bg-yellow-500 text-white hover:bg-yellow-600 transition">
            Modifier
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Ajout -->
<div *ngIf="showAddModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-lg">
    <h2 class="text-xl font-bold mb-6">Ajouter un participant</h2>
    <form (ngSubmit)="addParticipant()" #addForm="ngForm" class="space-y-4">
      <!-- Sélecteur d'événement (déjà filtré côté TS) -->
      <select [(ngModel)]="newParticipant.event" name="event" class="w-full border p-3 rounded" required>
        <option *ngFor="let e of events" [ngValue]="e">
          {{ e.titre }} ({{ e.dateDebut | date:'short' }})
        </option>
      </select>
      <!-- Statut -->
      <select [(ngModel)]="newParticipant.status" name="status" class="w-full border p-3 rounded" required>
        <option value="PENDING">PENDING</option>
        <option value="ACCEPTED">ACCEPTED</option>
        <option value="REJECTED">REJECTED</option>
      </select>
      <div class="flex justify-end gap-3 mt-6">
        <button type="button" (click)="showAddModal = false"
                class="px-4 py-2 rounded bg-gray-300 hover:bg-gray-400">Annuler</button>
        <button type="submit" [disabled]="!addForm.form.valid"
                class="px-4 py-2 rounded bg-green-500 text-white hover:bg-green-600">Valider</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal Édition -->
<div *ngIf="showEditModal && editParticipant" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-lg">
    <h2 class="text-xl font-bold mb-6">Modifier un participant</h2>
    <form (ngSubmit)="updateParticipant()" #editForm="ngForm" class="space-y-4">
      <!-- Statut -->
      <select [(ngModel)]="editParticipant.status" name="status" class="w-full border p-3 rounded" required>
        <option value="PENDING">PENDING</option>
        <option value="ACCEPTED">ACCEPTED</option>
        <option value="REJECTED">REJECTED</option>
      </select>
      <div class="flex justify-end gap-3 mt-6">
        <button type="button" (click)="showEditModal = false"
                class="px-4 py-2 rounded bg-gray-300 hover:bg-gray-400">Annuler</button>
        <button type="submit" [disabled]="!editForm.form.valid"
                class="px-4 py-2 rounded bg-green-500 text-white hover:bg-green-600">Mettre à jour</button>
      </div>
    </form>
  </div>
</div>
