spring.application.name=challenge-service
spring.datasource.url=jdbc:mysql://localhost:3306/challenge_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
server.port=8077
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
github.token=${GITHUB_TOKEN:}
sonar.token=${SONAR_TOKEN:}
keycloak.admin.url=http://localhost:8081
keycloak.admin.realm=smart-platform
keycloak.admin.username=admin
keycloak.admin.password=admin

# Keycloak JWT Security
# - Browser tokens have iss=https://localhost:8443/... (Angular uses HTTPS Keycloak)
# - JWKS fetched from HTTP (8081) to avoid SSL trust issues with self-signed certs
app.keycloak.issuer=https://localhost:8443/realms/smart-platform
app.keycloak.jwk-set-uri=http://localhost:8081/realms/smart-platform/protocol/openid-connect/certs