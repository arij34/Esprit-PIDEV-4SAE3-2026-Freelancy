spring.application.name=ExamQuiz-service
server.port=8150

spring.datasource.url=jdbc:mysql://localhost:3306/exam_quiz_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Eureka service discovery (same as challenge-service)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


exam.proctoring.threshold.default=3
exam.proctoring.threshold.phone-detected=2
exam.proctoring.threshold.tab-switch=3
exam.proctoring.threshold.looking-away=3

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
