server:
  port: 8080

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          # Override with env var in docker-compose
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/smart-platform}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
