<!-- ===============================================================
     NOTIFICATION BELL — frontoffice & backoffice
     Usage backoffice  : <app-notification-bell role="ADMIN"></app-notification-bell>
     Usage frontoffice : <app-notification-bell role="USER" [userId]="currentUserId"></app-notification-bell>
     =============================================================== -->

<div class="notif-wrapper">

  <!-- ── CLOCHE ────────────────────────────────────────────────── -->
  <button class="notif-bell-btn" (click)="togglePanel()" [class.active]="isOpen">
    <svg class="bell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>

    <!-- Badge compteur non lu -->
    <span class="notif-badge" *ngIf="unreadCount > 0">
      {{ unreadCount > 99 ? '99+' : unreadCount }}
    </span>

    <!-- Pulse animé quand non lu -->
    <span class="notif-pulse" *ngIf="unreadCount > 0"></span>
  </button>

  <!-- ── PANNEAU ────────────────────────────────────────────────── -->
  <div class="notif-panel" [class.open]="isOpen">

    <!-- Header -->
    <div class="notif-panel-header">
      <div class="notif-panel-title">
        <span class="notif-panel-icon">🔔</span>
        Notifications
        <span class="notif-header-count" *ngIf="unreadCount > 0">
          {{ unreadCount }} new
        </span>
      </div>

      <span class="notif-all-read" *ngIf="notifications.length > 0">
        All read ✓
      </span>
    </div>

    <!-- Liste -->
    <div class="notif-list">

      <!-- Item -->
      <div *ngFor="let notif of notifications"
           class="notif-item"
           [class.unread]="!notif.read">

        <div class="notif-item-icon">{{ getIcon(notif.type) }}</div>

        <div class="notif-item-body">
          <div class="notif-item-type">{{ getTypeLabel(notif.type) }}</div>
          <div class="notif-item-msg">{{ notif.message }}</div>

          <div class="notif-item-meta">
            <span class="notif-skill-tag" *ngIf="notif.skillName">
              #{{ notif.skillName }}
            </span>
            <span class="notif-time">{{ timeAgo(notif.createdAt) }}</span>
          </div>
        </div>

        <!-- Indicateur non lu -->
        <div class="notif-unread-dot" *ngIf="!notif.read"></div>
      </div>

      <!-- Empty state -->
      <div *ngIf="notifications.length === 0" class="notif-empty">
        <div class="notif-empty-icon">🔕</div>
        <div>No notifications yet</div>
      </div>

    </div>

  </div>
</div>
