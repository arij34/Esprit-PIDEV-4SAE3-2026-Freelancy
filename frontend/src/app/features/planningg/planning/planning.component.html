<div class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-purple-50 flex pt-20">
  <aside class="w-80 bg-transparent flex-shrink-0 hidden lg:block px-6 py-8">
    <div class="bg-white rounded-3xl shadow-xl p-6 border border-slate-200">
      <div class="mb-6">
        <label class="block">
          <span class="text-sm font-semibold text-slate-700 mb-2 block">Search Planning</span>
          <div class="relative">
            <input
              [(ngModel)]="searchQuery"
              (ngModelChange)="onSearchChange()"
              type="text"
              placeholder="Search planning..."
              class="w-full pl-10 pr-4 py-3 rounded-2xl bg-slate-100 border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-400 transition"
            />
          </div>
        </label>
      </div>

      <div class="mt-8">
        <button
          (click)="clearFilters()"
          class="w-full px-4 py-3 rounded-xl bg-slate-900 text-white font-semibold hover:bg-slate-800 transition"
        >
          Clear Filters
        </button>
      </div>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <div class="bg-white border-b border-slate-200 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 lg:py-8 flex justify-between items-center">
        <h1 class="text-2xl lg:text-3xl font-bold text-slate-900">Liste des plannings</h1>
        <button
          (click)="showAddModal = true"
          class="bg-blue-500 text-white px-5 py-2 rounded-lg shadow hover:bg-blue-600 transition"
        >
          Ajouter un planning
        </button>
      </div>
    </div>

    <div class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div
        *ngFor="let p of filteredPlannings"
        class="bg-white rounded-2xl shadow-md p-6 border border-slate-200 flex flex-col gap-3 hover:shadow-lg transition"
      >
        <h2 class="text-lg font-bold text-slate-800">Planning #{{ p.id ?? '-' }}</h2>
        <p class="text-slate-600">Type : {{ p.type || '-' }}</p>
        <p class="text-sm text-slate-500">Date création : {{ p.dateCreation ? (p.dateCreation | date:'short') : '-' }}</p>

        <qrcode
          [qrdata]="qrDataForPlanning(p)"
          [width]="128"
          [errorCorrectionLevel]="'M'"
        ></qrcode>


        <div class="flex gap-2 mt-3">
          <button
            (click)="p.id && deletePlanning(p.id)"
            class="flex-1 px-4 py-2 rounded-lg bg-red-500 text-white hover:bg-red-600 transition"
          >
            Supprimer
          </button>
          <button
            (click)="startEdit(p)"
            class="flex-1 px-4 py-2 rounded-lg bg-yellow-500 text-white hover:bg-yellow-600 transition"
          >
            Modifier
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div *ngIf="showAddModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-lg">
    <h2 class="text-xl font-bold mb-6">Ajouter un planning</h2>
    <form (ngSubmit)="addPlanning()" #addForm="ngForm" class="space-y-4">
      <input [(ngModel)]="newPlanning.type" name="type" placeholder="Type" class="w-full border p-3 rounded" required />
      <input
        [(ngModel)]="newPlanning.dateCreation"
        name="dateCreation"
        type="datetime-local"
        class="w-full border p-3 rounded"
        required
      />

      <div class="flex justify-end gap-3 mt-6">
        <button type="button" (click)="showAddModal = false" class="px-4 py-2 rounded bg-gray-300 hover:bg-gray-400">
          Annuler
        </button>
        <button
          type="submit"
          [disabled]="!addForm.form.valid"
          class="px-4 py-2 rounded bg-green-500 text-white hover:bg-green-600"
        >
          Valider
        </button>
      </div>
    </form>
  </div>
</div>

<div *ngIf="showEditModal && editPlanning" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-lg">
    <h2 class="text-xl font-bold mb-6">Modifier un planning</h2>
    <form (ngSubmit)="updatePlanning()" #editForm="ngForm" class="space-y-4">
      <input [(ngModel)]="editPlanning.type" name="type" placeholder="Type" class="w-full border p-3 rounded" required />
      <input
        [(ngModel)]="editPlanning.dateCreation"
        name="dateCreation"
        type="datetime-local"
        class="w-full border p-3 rounded"
        required
      />

      <div class="flex justify-end gap-3 mt-6">
        <button type="button" (click)="showEditModal = false" class="px-4 py-2 rounded bg-gray-300 hover:bg-gray-400">
          Annuler
        </button>
        <button
          type="submit"
          [disabled]="!editForm.form.valid"
          class="px-4 py-2 rounded bg-green-500 text-white hover:bg-green-600"
        >
          Mettre à jour
        </button>
      </div>
    </form>
  </div>
</div>
