spring.application.name=planningg
# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/planning?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Server
server.port=${SERVER_PORT:8089}
server.address=0.0.0.0
server.servlet.context-path=/planning

# Swagger
springdoc.swagger-ui.path=/swagger-ui

# CORS
spring.web.cors.allow-credentials=true
spring.web.cors.allowed-origins=http://localhost:4200

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Task notification email
app.mail.task-created.to=mohamedjaffel08@gmail.com
app.mail.task-created.from=${spring.mail.username}

# Gemini AI
gemini.api.key=
gemini.model=gemini-2.5-flash
gemini.base-url=https://generativelanguage.googleapis.com/v1beta/models

# EUREKA CLIENT CONFIGURATION
eureka.client.enabled=${EUREKA_ENABLED:false}
spring.cloud.discovery.enabled=${EUREKA_ENABLED:false}
eureka.client.serviceUrl.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.client.fetchRegistry=${EUREKA_ENABLED:false}
eureka.client.registerWithEureka=${EUREKA_ENABLED:false}
